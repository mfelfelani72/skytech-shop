version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pg_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: skytech_shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: laravel_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_DATABASE: skytech_shop
      DB_USERNAME: admin
      DB_PASSWORD: admin

  frontend:
    build: ./frontend
    container_name: next_app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: